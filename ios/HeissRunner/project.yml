name: HeissRunner
options:
  bundleIdPrefix: so.heiss
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  HeissRunner:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: so.heiss.runner
        INFOPLIST_FILE: Sources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
  HeissRunnerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: HeissRunner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: so.heiss.runner.uitests
        TEST_TARGET_NAME: HeissRunner
        CODE_SIGN_STYLE: Automatic
schemes:
  HeissRunner:
    build:
      targets:
        HeissRunner: all
        HeissRunnerUITests: [test]
    test:
      targets:
        - HeissRunnerUITests
